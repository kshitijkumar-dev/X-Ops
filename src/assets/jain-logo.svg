<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .jain-symbol {
        fill: none;
        stroke: currentColor;
        stroke-width: 2;
      }
      .jain-fill {
        fill: currentColor;
      }
    </style>
  </defs>
  
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" class="jain-symbol" opacity="0.3"/>
  
  <!-- Inner Circle -->
  <circle cx="100" cy="100" r="80" class="jain-symbol" opacity="0.3"/>
  
  <!-- Main Swastika Symbol -->
  <!-- Top horizontal arm -->
  <rect x="85" y="25" width="30" height="35" class="jain-fill" rx="3"/>
  <!-- Right horizontal arm -->
  <rect x="140" y="85" width="35" height="30" class="jain-fill" rx="3"/>
  <!-- Bottom horizontal arm -->
  <rect x="85" y="140" width="30" height="35" class="jain-fill" rx="3"/>
  <!-- Left horizontal arm -->
  <rect x="25" y="85" width="35" height="30" class="jain-fill" rx="3"/>
  
  <!-- Center dot (Bindu) -->
  <circle cx="100" cy="100" r="8" class="jain-fill"/>
  
  <!-- Curved ornaments on each arm -->
  <!-- Top arm curves -->
  <path d="M 92 50 Q 85 50 85 57" class="jain-symbol"/>
  <path d="M 108 50 Q 115 50 115 57" class="jain-symbol"/>
  
  <!-- Right arm curves -->
  <path d="M 150 92 Q 150 85 157 85" class="jain-symbol"/>
  <path d="M 150 108 Q 150 115 157 115" class="jain-symbol"/>
  
  <!-- Bottom arm curves -->
  <path d="M 92 150 Q 85 150 85 143" class="jain-symbol"/>
  <path d="M 108 150 Q 115 150 115 143" class="jain-symbol"/>
  
  <!-- Left arm curves -->
  <path d="M 50 92 Q 50 85 43 85" class="jain-symbol"/>
  <path d="M 50 108 Q 50 115 43 115" class="jain-symbol"/>
  
  <!-- Corner dots (Chandrabindu) -->
  <circle cx="100" cy="35" r="4" class="jain-fill" opacity="0.6"/>
  <circle cx="100" cy="165" r="4" class="jain-fill" opacity="0.6"/>
  <circle cx="35" cy="100" r="4" class="jain-fill" opacity="0.6"/>
  <circle cx="165" cy="100" r="4" class="jain-fill" opacity="0.6"/>
</svg>